<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratched - Редактор</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="scratched.global.css">
    <script src="https://unpkg.com/blockly@11.2.1/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly@11.2.1/msg/ru.js"></script>
</head>
<body>
    <div class="editor-header">
        <div class="logo" onclick="location.href='index.html'">
            <img src="favicon.png" alt="" width="28" height="28" style="vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'">SCRATCHED
        </div>
        <div class="run-panel">
            <button class="run-btn" id="runCode">Выполнить</button>
            <button class="clear-btn" id="clearOutput">Очистить вывод</button>
            <button class="reset-btn" id="resetBlocks">Сбросить блоки</button>
            <button class="reset-btn" id="saveProjectBtn" style="background:#8e44ad">Сохранить</button>
            <button class="reset-btn" id="loadProjectBtn" style="background:#16a085">Загрузить</button>
            <button class="reset-btn" id="copyOutputBtn" style="background:#f39c12">Копировать вывод</button>
        </div>
    </div>
    <div class="editor-container">
        <div class="blockly-workspace" id="blocklyDiv"></div>
        <div class="output-panel">
            <div class="output-title">Вывод программы</div>
            <div class="output-content" id="outputContent"></div>
        </div>
    </div>
    <script src="scratched.script.js"></script>
</body>
</html>
