<body>
    <div class="editor-header">
        <div class="logo" onclick="location.href='index.html'">SCRATCHED</div>
        <div class="lang-panel">
            <button class="lang-btn" data-lang="ru">Русский</button>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="tr">Türkçe</button>
            <button class="lang-btn" data-lang="de">Deutsch</button>

            <button class="run-btn" id="runCode">▶ Выполнить</button>
            <button class="clear-btn" id="clearOutput">Очистить</button>
