<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratched - Главная</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="scratched.global.css">
    <style>
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #ff8c42 0%, #e67e22 100%);
            color: white;
        }
        .hero-img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 64px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .hero h1 img {
            width: 64px;
            height: 64px;
        }
        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .start-btn {
            background: #1e2a36;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .start-btn:hover {
            background: #2c3e50;
            transform: scale(1.05);
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            flex-wrap: wrap;
            background: #f8f9fa;
        }
        .feature-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 250px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .feature-card h3 {
            color: #ff8c42;
            margin: 15px 0;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #1e2a36;
            color: white;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="logo.png" alt="Scratched Logo" class="hero-img" onerror="this.style.display='none'">
        <h1>
            <img src="favicon.png" alt="" onerror="this.style.display='none'"> SCRATCHED
        </h1>
        <p>Визуальное программирование для всех</p>
        <button class="start-btn" onclick="location.href='editor.html'">Начать творить</button>
    </div>
    <div class="features">
        <div class="feature-card">
            <div style="font-size: 48px;">[ ]</div>
            <h3>Блочный редактор</h3>
            <p>Собирай код как конструктор</p>
        </div>
        <div class="feature-card">
            <div style="font-size: 48px;">#</div>
            <h3>Русский язык</h3>
            <p>Полностью на русском</p>
        </div>
        <div class="feature-card">
            <div style="font-size: 48px;">▶</div>
            <h3>Выполнение кода</h3>
            <p>Запускай свои программы</p>
        </div>
    </div>
    <footer>
        <p>Scratched - Простой аналог Scratch на Blockly</p>
    </footer>
</body>
</html>
